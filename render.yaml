services:
  - type: web
    name: discord-bot
    runtime: python
    buildCommand: pip install -r discord-bot/requirements.txt
    startCommand: python main.py
    envVars:
      - key: DISCORD_BOT_TOKEN
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: GENIUS_ACCESS_TOKEN
        sync: false
      - key: PYTHON_VERSION
        value: 3.11.0
